version: "3.8"
services:
  api-server:
    container_name: urlshortener-springboot
    build:
      context: .
      dockerfile: api.Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysqlurldb:3306/urldb
      - SPRING_DATASOURCE_USERNAME=urlshortener
      - SPRING_DATASOURCE_PASSWORD=123456
      - SAFEBROWSING_ENABLED=true
      - SAFEBROWSING_APIKEY=AIzaSyB-HjgFzXpz9hyinJSS98u2iru6NfrAi7E
    ports:
      - "18080:8080"
    networks:
      - urlshortener-mysql-network
    depends_on:
      api-db:
        condition: service_healthy

  api-db:
    container_name: mysqlurldb
    build:
      context: .
      dockerfile: db.Dockerfile
    networks:
      - urlshortener-mysql-network
    environment:
      - MYSQL_ROOT_PASSWORD=gg20050105
      - MYSQL_DATABASE=urldb
      - MYSQL_USER=urlshortener
      - MYSQL_PASSWORD=123456
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  urlshortener-mysql-network:

volumes:
  mysql_data: